version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: journeymate-postgres
    environment:
      POSTGRES_DB: journeymatedb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../
      dockerfile: devops/Dockerfile.backend
    container_name: journeymate-backend-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/journeymatedb
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgrespassword
      SPRING_JPA_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../
      dockerfile: devops/Dockerfile.frontend
    container_name: journeymate-frontend-ui
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
