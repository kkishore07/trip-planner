server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: journeymate-backend

  datasource:
    # Default to H2 for instant execution; can be overridden by ENV for PostgreSQL
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:journeymatedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  jpa:
    database-platform: ${SPRING_JPA_PLATFORM:org.hibernate.dialect.H2Dialect}
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

journeymate:
  jwt:
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    expiration-ms: 86400000 # 24 hours
  ai:
    openai-api-key: ${OPENAI_API_KEY:mock-key}
    model: gpt-3.5-turbo
  weather:
    api-key: ${OPENWEATHER_API_KEY:mock-key}
  places:
    api-key: ${PLACES_API_KEY:mock-key}
